<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blah Blah Blah — Voice Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>💬</text></svg>">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #FFFFFF;
      color: #111111;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    /* ===== SETUP OVERLAY ===== */
    #setup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .setup-container {
      max-width: 480px;
      width: 100%;
      padding: 0 20px;
    }

    .setup-container h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      text-align: center;
    }

    .setup-container .subtitle {
      font-size: 14px;
      color: #666666;
      text-align: center;
      margin-bottom: 40px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .api-key-section {
      margin-bottom: 30px;
    }

    .api-key-section label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: #111111;
    }

    .api-key-section input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #E0E0E0;
      background-color: #FFFFFF;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #111111;
    }

    .api-key-section input::placeholder {
      color: #999999;
    }

    .api-key-section .hint {
      font-size: 12px;
      color: #999999;
      margin-top: 8px;
      font-weight: 400;
    }

    #startBtn {
      width: 100%;
      padding: 14px 20px;
      background-color: #111111;
      color: #FFFFFF;
      border: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 200ms ease;
    }

    #startBtn:hover {
      background-color: #333333;
    }

    #startBtn:active {
      background-color: #000000;
    }

    /* ===== MAIN APP ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid #E0E0E0;
      background-color: #FFFFFF;
    }

    header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 0;
    }

    .header-left {
      grid-column: 1;
    }

    .header-right {
      grid-column: 2;
      display: flex;
      justify-content: flex-end;
    }

    #muteBtn {
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #111111;
      cursor: pointer;
      padding: 4px 0;
      text-decoration: none;
      transition: color 200ms ease;
    }

    #muteBtn:hover {
      color: #666666;
    }

    /* ===== STATE BAR ===== */
    #stateBar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background-color: #FFFFFF;
      border-bottom: 1px solid #E0E0E0;
    }

    .state-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #999999;
      transition: background-color 200ms ease;
      flex-shrink: 0;
    }

    .state-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #111111;
      white-space: nowrap;
      transition: color 200ms ease;
    }

    .state-description {
      font-size: 12px;
      color: #999999;
      flex: 1;
    }

    /* ===== MAIN CONTENT ===== */
    main {
      flex: 1;
      overflow: auto;
      padding: 40px 20px;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    section {
      display: flex;
      flex-direction: column;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #111111;
      margin-bottom: 16px;
    }

    .transcript-content,
    .response-content {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.6;
      color: #111111;
      word-wrap: break-word;
      overflow-wrap: break-word;
      min-height: 100px;
    }

    .response-content {
      font-size: 16px;
      color: #666666;
    }

    .response-content:empty {
      color: #E0E0E0;
    }

    .response-content:empty::before {
      content: "Awaiting response...";
    }

    /* ===== FOOTER ===== */
    footer {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      align-items: center;
      padding: 12px 20px;
      border-top: 1px solid #E0E0E0;
      background-color: #FFFFFF;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #999999;
      flex-shrink: 0;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .state-dot-small {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #999999;
      transition: background-color 200ms ease;
      flex-shrink: 0;
    }

    .footer-center {
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .footer-right {
      text-align: right;
      white-space: nowrap;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      header {
        grid-template-columns: 1fr;
      }

      .header-left {
        grid-column: 1;
      }

      .header-right {
        grid-column: 1;
        justify-content: flex-start;
      }

      main {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 20px;
      }

      .transcript-content,
      .response-content {
        font-size: 16px;
      }

      footer {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        font-size: 11px;
      }

      .footer-center {
        grid-column: 1 / -1;
        order: 3;
        text-align: left;
      }
    }

    /* ===== ERROR STATE ===== */
    .error-message {
      padding: 12px 16px;
      background-color: #FFE6E6;
      border: 1px solid #FF9999;
      color: #CC0000;
      font-size: 14px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- Setup Overlay -->
  <div id="setup">
    <div class="setup-container">
      <h1>Blah Blah Blah</h1>
      <p class="subtitle">Hands-free voice assistant</p>
      <div class="api-key-section">
        <label>Anthropic API Key</label>
        <input type="password" placeholder="sk-ant-api03-..." id="apiKeyInput" autocomplete="off">
        <p class="hint">Session only. Never stored or logged.</p>
      </div>
      <button id="startBtn">Initialize</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" style="display:none">
    <header>
      <div class="header-left">
        <h1>Blah Blah Blah</h1>
      </div>
      <div class="header-right">
        <button id="muteBtn" title="Mute audio responses">Audio On</button>
      </div>
    </header>

    <div id="stateBar">
      <span class="state-dot"></span>
      <span class="state-label">Idle</span>
      <span class="state-description">Say "blah blah blah" to activate</span>
    </div>

    <main>
      <section id="transcription">
        <div class="section-label">Input</div>
        <div id="liveText" class="transcript-content"></div>
      </section>

      <section id="conversation">
        <div class="section-label">Response</div>
        <div id="responseArea" class="response-content"></div>
      </section>
    </main>

    <footer>
      <div class="footer-left">
        <span class="state-dot-small"></span>
        <span id="footerState">Idle</span>
      </div>
      <div class="footer-center">
        Session ephemeral · No data persisted
      </div>
      <div class="footer-right">
        <span id="footerTime">00:00:00</span>
      </div>
    </footer>
  </div>

  <script>
    // ===== STATE MACHINE =====
    const STATES = {
      IDLE: {
        color: '#999999',
        label: 'Idle',
        description: 'Say "blah blah blah" to activate'
      },
      LISTENING: {
        color: '#00AA44',
        label: 'Listening',
        description: 'Speak your query...'
      },
      PROCESSING: {
        color: '#0066CC',
        label: 'Processing',
        description: 'Generating response...'
      },
      RESPONDING: {
        color: '#CC6600',
        label: 'Responding',
        description: 'Playing response...'
      },
      ERROR: {
        color: '#CC0000',
        label: 'Error',
        description: 'An error occurred'
      }
    };

    // ===== APP STATE =====
    const appState = {
      currentState: 'IDLE',
      apiKey: null,
      messages: [],
      transcript: '',
      interimTranscript: '',
      isMuted: false,
      silenceTimer: null,
      recognition: null,
      audioContext: null,
      isWakeWordDetected: false,
      sessionStartTime: null
    };

    // ===== DOM ELEMENTS =====
    const setupOverlay = document.getElementById('setup');
    const appDiv = document.getElementById('app');
    const startBtn = document.getElementById('startBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const muteBtn = document.getElementById('muteBtn');
    const liveText = document.getElementById('liveText');
    const responseArea = document.getElementById('responseArea');
    const footerState = document.getElementById('footerState');
    const footerTime = document.getElementById('footerTime');
    const stateBar = document.getElementById('stateBar');

    // ===== STATE MANAGEMENT =====
    function setState(newState) {
      if (newState === appState.currentState) return;

      appState.currentState = newState;
      const state = STATES[newState];

      // Update UI
      const stateDot = document.querySelector('.state-dot');
      const stateLabel = document.querySelector('.state-label');
      const stateDescription = document.querySelector('.state-description');
      const dotSmall = document.querySelector('.state-dot-small');

      stateDot.style.backgroundColor = state.color;
      stateLabel.textContent = state.label;
      stateLabel.style.color = state.color;
      stateDescription.textContent = state.description;
      dotSmall.style.backgroundColor = state.color;
      footerState.textContent = state.label;

      // Handle state-specific logic
      if (newState === 'IDLE') {
        clearSilenceTimer();
        appState.transcript = '';
        appState.interimTranscript = '';
        appState.isWakeWordDetected = false;
        liveText.textContent = '';
      } else if (newState === 'LISTENING') {
        liveText.textContent = '';
        appState.transcript = '';
        appState.interimTranscript = '';
      } else if (newState === 'PROCESSING') {
        clearSilenceTimer();
      } else if (newState === 'ERROR') {
        clearSilenceTimer();
        setTimeout(() => setState('IDLE'), 5000);
      }
    }

    // ===== INITIALIZATION =====
    startBtn.addEventListener('click', async () => {
      const key = apiKeyInput.value.trim();
      if (!key) {
        alert('Please enter your API key');
        return;
      }

      appState.apiKey = key;
      appState.sessionStartTime = Date.now();
      setupOverlay.style.display = 'none';
      appDiv.style.display = 'flex';

      // Initialize speech recognition
      initializeSpeechRecognition();

      // Start time display
      updateFooterTime();
      setInterval(updateFooterTime, 1000);

      // Set initial state
      setState('IDLE');
    });

    // ===== TIME DISPLAY =====
    function updateFooterTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      footerTime.textContent = `${hours}:${minutes}:${seconds}`;
    }

    // ===== MUTE BUTTON =====
    muteBtn.addEventListener('click', () => {
      appState.isMuted = !appState.isMuted;
      muteBtn.textContent = appState.isMuted ? 'Audio Off' : 'Audio On';
    });

    // ===== SPEECH RECOGNITION =====
    function initializeSpeechRecognition() {
      const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
      if (!SpeechRecognition) {
        showError('Speech Recognition not supported');
        return;
      }

      appState.recognition = new SpeechRecognition();
      appState.recognition.continuous = true;
      appState.recognition.interimResults = true;
      appState.recognition.lang = 'en-US';

      appState.recognition.onstart = () => {
        console.log('Speech recognition started');
      };

      appState.recognition.onresult = (event) => {
        appState.interimTranscript = '';
        let finalTranscript = appState.transcript;

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i].transcript;

          if (event.results[i].isFinal) {
            finalTranscript += transcript + ' ';
          } else {
            appState.interimTranscript += transcript;
          }
        }

        appState.transcript = finalTranscript;

        // Check for wake word in interim + final results
        const allText = (finalTranscript + appState.interimTranscript).toLowerCase();
        const wakeWordMatch = detectWakeWord(allText);

        if (wakeWordMatch && appState.currentState === 'IDLE') {
          appState.isWakeWordDetected = true;
          setState('LISTENING');
          playWakeBeep();
          // Clear the wake word from transcript
          appState.transcript = removeWakeWord(finalTranscript);
          appState.interimTranscript = '';
        }

        // Exit commands while listening
        if (appState.currentState === 'LISTENING') {
          if (detectExitCommand(allText)) {
            setState('IDLE');
            return;
          }

          // Update display
          liveText.textContent = (appState.transcript + appState.interimTranscript).trim();

          // Reset silence timer
          clearSilenceTimer();
          if (finalTranscript.trim()) {
            appState.silenceTimer = setTimeout(() => {
              if (appState.transcript.trim()) {
                sendToClaude(appState.transcript.trim());
              }
            }, 2000);
          }
        }
      };

      appState.recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        if (event.error !== 'no-speech') {
          showError(`Recognition error: ${event.error}`);
        }
      };

      appState.recognition.onend = () => {
        // Restart recognition if not in error state
        if (appState.currentState !== 'ERROR') {
          setTimeout(() => {
            if (appState.recognition && appState.currentState !== 'ERROR') {
              appState.recognition.start();
            }
          }, 100);
        }
      };

      appState.recognition.start();
    }

    // ===== WAKE WORD DETECTION =====
    function detectWakeWord(text) {
      // Match variations: "blah blah blah", "blah blah", "bla bla bla", etc.
      const patterns = [
        /blah\s+blah\s+blah/i,
        /blah\s+blah/i,
        /bla\s+bla\s+bla/i,
        /bla\s+bla/i,
        /blahblahblah/i
      ];

      return patterns.some(pattern => pattern.test(text));
    }

    function removeWakeWord(text) {
      return text
        .replace(/blah\s+blah\s+blah/gi, '')
        .replace(/blah\s+blah/gi, '')
        .replace(/bla\s+bla\s+bla/gi, '')
        .replace(/bla\s+bla/gi, '')
        .replace(/blahblahblah/gi, '')
        .trim();
    }

    // ===== EXIT COMMAND DETECTION =====
    function detectExitCommand(text) {
      const exitPatterns = [
        /turn\s+off/i,
        /stop\s+listening/i,
        /^stop$/i,
        /cancel/i
      ];

      return exitPatterns.some(pattern => pattern.test(text));
    }

    // ===== SILENCE TIMER =====
    function clearSilenceTimer() {
      if (appState.silenceTimer) {
        clearTimeout(appState.silenceTimer);
        appState.silenceTimer = null;
      }
    }

    // ===== AUDIO FEEDBACK =====
    function playWakeBeep() {
      try {
        const audioCtx = appState.audioContext || new (window.AudioContext || window.webkitAudioContext)();
        appState.audioContext = audioCtx;

        const startFreq = 440;
        const endFreq = 880;
        const duration = 0.1;
        const now = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.setValueAtTime(startFreq, now);
        osc.frequency.exponentialRampToValueAtTime(endFreq, now + duration);

        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {
        console.error('Audio feedback error:', e);
      }
    }

    // ===== CLAUDE API =====
    async function sendToClaude(text) {
      setState('PROCESSING');

      // Add user message
      appState.messages.push({ role: 'user', content: text });

      // Cap conversation history
      if (appState.messages.length > 20) {
        appState.messages = appState.messages.slice(-20);
      }

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': appState.apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-3-5-sonnet-20241022',
            max_tokens: 1024,
            system: 'You are a hands-free voice assistant called Blah Blah Blah. The user speaks to you and hears your responses read aloud. Keep responses concise — aim for 1-3 sentences unless detail is requested. Avoid markdown, code blocks, lists, or formatting characters. Speak naturally as in conversation.',
            messages: appState.messages
          })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error?.message || `API error: ${response.status}`);
        }

        const data = await response.json();
        const assistantMessage = data.content[0].text;

        // Add assistant message
        appState.messages.push({ role: 'assistant', content: assistantMessage });

        // Display response
        responseArea.textContent = assistantMessage;

        // Speak response
        if (!appState.isMuted) {
          speak(assistantMessage);
        } else {
          setState('IDLE');
        }
      } catch (error) {
        console.error('Claude API error:', error);
        responseArea.innerHTML = `<div class="error-message">Error: ${error.message}</div>`;
        showError(`API Error: ${error.message}`);
      }
    }

    // ===== TEXT-TO-SPEECH =====
    function speak(text) {
      setState('RESPONDING');

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1;
      utterance.pitch = 1;
      utterance.volume = 0.8;

      utterance.onend = () => {
        setState('IDLE');
      };

      utterance.onerror = (event) => {
        console.error('Speech synthesis error:', event);
        setState('IDLE');
      };

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    // ===== ERROR HANDLING =====
    function showError(message) {
      setState('ERROR');
      responseArea.innerHTML = `<div class="error-message">${message}</div>`;
    }

    // ===== REQUEST MIC PERMISSION ON LOAD =====
    window.addEventListener('load', async () => {
      try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        console.warn('Microphone permission not granted yet (will be requested on init)');
      }
    });
  </script>
</body>
</html>
